server.port=${SERVER_PORT:8080}

# Base Docker profile: boot the API without external services first.
spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

firebase.enabled=${FIREBASE_ENABLED:false}
firebase.sdk.path=${FIREBASE_SDK_PATH:/run/secrets/firebase-service-account.json}

aws.accessKey=${AWS_ACCESS_KEY:local}
aws.secretKey=${AWS_SECRET_KEY:local}
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:snapscreen-local}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
