name: snapscreen

services:
  api:
    image: snapscreen-api:local
    build:
      context: ./backend/snapscreen-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-docker}"
      SERVER_PORT: "8080"
      JAVA_OPTS: "${JAVA_OPTS:-}"
      FIREBASE_ENABLED: "${FIREBASE_ENABLED:-false}"
      FIREBASE_SDK_PATH: "${FIREBASE_SDK_PATH:-/run/secrets/firebase-service-account.json}"
      AWS_ACCESS_KEY: "${AWS_ACCESS_KEY:-local}"
      AWS_SECRET_KEY: "${AWS_SECRET_KEY:-local}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_S3_BUCKET: "${AWS_S3_BUCKET:-snapscreen-local}"
    volumes:
      - type: bind
        source: ${FIREBASE_SERVICE_ACCOUNT_PATH:-./backend/snapscreen-api/src/main/resources/firebase-service-account.json.example}
        target: /run/secrets/firebase-service-account.json
        read_only: true
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: snapscreen-frontend:local
    build:
      context: ./snapscreen
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080}"
        NEXT_PUBLIC_FIREBASE_API_KEY: "${NEXT_PUBLIC_FIREBASE_API_KEY:-}"
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}"
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: "${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}"
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}"
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}"
        NEXT_PUBLIC_FIREBASE_APP_ID: "${NEXT_PUBLIC_FIREBASE_APP_ID:-}"
        NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:-}"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
